---
name: Build gems

on:
  push:
    tags:
      - "v*"
      - "cross-gem/*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  ci-data:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.fetch.outputs.result }}
    steps:
      - uses: oxidize-rb/actions/fetch-ci-data@v1
        id: fetch
        with:
          supported-ruby-platforms: |
            exclude: ["arm-linux", "x64-mingw32"]
          stable-ruby-versions: |
            exclude: ["head"]

  source-gem:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true

      - name: Build gem
        run: bundle exec rake build

      - uses: actions/upload-artifact@v7
        with:
          name: source-gem
          path: pkg/*.gem

  cross-gem:
    name: Compile native gem for ${{ matrix.platform }}
    runs-on: ubuntu-latest
    needs: ci-data
    strategy:
      matrix:
        platform: ${{ fromJSON(needs.ci-data.outputs.result).supported-ruby-platforms }}
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true

      - uses: oxidize-rb/actions/cross-gem@v1
        id: cross-gem
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: ${{ join(fromJSON(needs.ci-data.outputs.result).stable-ruby-versions, ',') }}

      - uses: actions/upload-artifact@v7
        with:
          name: cross-gem
          path: ${{ steps.cross-gem.outputs.gem-path }}

  release:
    name: Create GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - source-gem
      - cross-gem
    steps:
      - name: Download source gem
        uses: actions/download-artifact@v5
        with:
          name: source-gem
          path: pkg/source-gem

      - name: Download cross gems
        uses: actions/download-artifact@v5
        with:
          path: pkg/cross-gem
          pattern: cross-gem*
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            pkg/source-gem/*.gem
            pkg/cross-gem/*.gem

  publish-rubygems:
    name: Publish to RubyGems.org
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - source-gem
      - cross-gem
    permissions:
      contents: read
      id-token: write
    environment: release
    steps:
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"

      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@main

      - name: Download source gem
        uses: actions/download-artifact@v5
        with:
          name: source-gem
          path: pkg/source-gem

      - name: Download cross gems
        uses: actions/download-artifact@v5
        with:
          path: pkg/cross-gem
          pattern: cross-gem*
          merge-multiple: true

      - name: Publish gems to RubyGems.org
        shell: bash
        run: |
          shopt -s nullglob
          for gem_file in pkg/source-gem/*.gem pkg/cross-gem/*.gem; do
            gem push "$gem_file"
          done

  publish-github-packages:
    name: Publish to GitHub Packages
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - source-gem
      - cross-gem
    permissions:
      contents: read
      packages: write
    steps:
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"

      - name: Download source gem
        uses: actions/download-artifact@v5
        with:
          name: source-gem
          path: pkg/source-gem

      - name: Download cross gems
        uses: actions/download-artifact@v5
        with:
          path: pkg/cross-gem
          pattern: cross-gem*
          merge-multiple: true

      - name: Configure GitHub Packages credentials
        shell: bash
        run: |
          mkdir -p ~/.gem
          cat > ~/.gem/credentials <<EOF
          ---
          :github: Bearer ${GITHUB_TOKEN}
          EOF
          chmod 0600 ~/.gem/credentials
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Publish gems to GitHub Packages
        shell: bash
        run: |
          shopt -s nullglob
          for gem_file in pkg/source-gem/*.gem pkg/cross-gem/*.gem; do
            gem push --key github --host "https://rubygems.pkg.github.com/${OWNER}" "$gem_file"
          done
        env:
          OWNER: ${{ github.repository_owner }}
